# AgroPulse Application Configuration
spring.application.name=agropulse

# Server
server.address=0.0.0.0
server.port=${SERVER_PORT:8082}
server.servlet.context-path=/api

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/agropulse_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=AgroPulseSecretKeyForJWTTokenGenerationMustBe256BitsLong2024SecureKey
jwt.expiration=86400000
jwt.remember-me-expiration=604800000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:3000,http://192.168.1.8:5173,http://192.168.1.8:5174

# OpenWeatherMap API (set OPENWEATHER_API_KEY environment variable)
weather.api.key=${OPENWEATHER_API_KEY:}
weather.api.url=https://api.openweathermap.org/data/2.5
weather.api.geo-url=https://api.openweathermap.org/geo/1.0

# Dialogflow (optional)
dialogflow.project-id=${DIALOGFLOW_PROJECT_ID:}
dialogflow.language-code=en
dialogflow.enabled=false

# Email (for OTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=false

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# Logging
logging.level.com.agropulse=INFO
logging.level.org.springframework.security=WARN
